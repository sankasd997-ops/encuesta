<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Energy Tracker</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilos.css">

</head>

<body>

    <!-- Fondo decorativo -->
    <div class="background-blur blur1"></div>
    <div class="background-blur blur2"></div>

    <main class="container">

        <!-- Tarjeta principal -->
        <section class="card">

            <!-- Encabezado -->
            <div class="header">

                <div class="logo">

                    <div class="logo-circle">
                        <i class="fa-solid fa-bolt"></i>
                    </div>

                    <h1>Energy Tracker</h1>

                </div>

                <p class="subtitle">
                    ¿Qué nivel de energía tienes hoy?
                </p>

            </div>

            <!-- Formulario -->
            <form id="energyForm">

                <div class="emoji-container">

                    <label class="emoji-option">

                        <input
                            type="radio"
                            name="energia"
                            value="1">

                        <span class="emoji">😫</span>

                        <span class="emoji-text">
                            Muy baja
                        </span>

                    </label>

                    <label class="emoji-option">

                        <input
                            type="radio"
                            name="energia"
                            value="2">

                        <span class="emoji">🙁</span>

                        <span class="emoji-text">
                            Baja
                        </span>

                    </label>

                    <label class="emoji-option">

                        <input
                            type="radio"
                            name="energia"
                            value="3">

                        <span class="emoji">😐</span>

                        <span class="emoji-text">
                            Normal
                        </span>

                    </label>

                    <label class="emoji-option">

                        <input
                            type="radio"
                            name="energia"
                            value="4">

                        <span class="emoji">🙂</span>

                        <span class="emoji-text">
                            Buena
                        </span>

                    </label>

                    <label class="emoji-option">

                        <input
                            type="radio"
                            name="energia"
                            value="5">

                        <span class="emoji">😁</span>

                        <span class="emoji-text">
                            Excelente
                        </span>

                    </label>

                </div>

                <button
                    type="submit"
                    id="btnEnviar"
                    class="btn-primary">

                    <i class="fa-solid fa-paper-plane"></i>

                    Enviar respuesta

                </button>

            </form>

            <!-- Mensaje -->
            <div
                id="mensaje"
                class="mensaje">

            </div>

        </section>

        <!-- Footer -->
        <footer>

            <p>
                Gracias por participar ❤️
            </p>

        </footer>

    </main>

    <!-- Firebase -->
    <script type="module" src="js/firebase.js"></script>

    <!-- Lógica -->
    <script type="module" src="js/formulario.js"></script>

</body>

</html>
