<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | ¿A Cuánto Vas?</title>

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/estilos.css">

    <style>
        .reactions-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            pointer-events: none;
            z-index: 999;
            max-width: 90vw;
        }

        .reaction-chip {
            font-size: 2rem;
            line-height: 1;
            animation: reactionPop 1.6s ease-out forwards;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
        }

        @keyframes reactionPop {
            0% {
                transform: scale(0.3) translateY(10px);
                opacity: 0;
            }
            20% {
                transform: scale(1.3) translateY(-6px);
                opacity: 1;
            }
            35% {
                transform: scale(1) translateY(0);
            }
            80% {
                transform: scale(1) translateY(-4px);
                opacity: 1;
            }
            100% {
                transform: scale(0.8) translateY(-24px);
                opacity: 0;
            }
        }
    </style>

</head>

<body class="dashboard-body">

    <!-- Fondo -->
    <div class="background-blur blur1"></div>
    <div class="background-blur blur2"></div>

    <!-- Contenedor de animaciones de nuevas respuestas -->
    <div id="reactionsContainer" class="reactions-container" aria-live="polite"></div>

    <main class="dashboard-container">

        <!-- Encabezado -->

        <header class="dashboard-header">

            <div>

                <h1>

                    <i class="fa-solid fa-bolt"></i>

                    ¿A Cuánto Vas?

                </h1>

                <p>
                    Dashboard en tiempo real
                </p>

            </div>

            <div class="live-indicator">

                <span class="live-dot"></span>

                EN VIVO

            </div>

        </header>

        <!-- Tarjetas KPI -->

        <section class="kpi-grid">

            <div class="kpi-card">

                <h3>Total respuestas</h3>

                <span id="totalRespuestas">

                    0

                </span>

            </div>

        </section>


        <!-- Distribución -->

        <section class="stats-card">

            <h2>

                Respuestas

            </h2>

            <!-- Nivel 1 -->

            <div class="row">

                <div class="emoji-label">

                    😫

                </div>

                <div class="bar">

                    <div
                        id="bar1"
                        class="fill red">

                    </div>

                </div>

                <div
                    id="count1"
                    class="count">

                    0

                </div>

            </div>

            <!-- Nivel 2 -->

            <div class="row">

                <div class="emoji-label">

                    🙁

                </div>

                <div class="bar">

                    <div
                        id="bar2"
                        class="fill orange">

                    </div>

                </div>

                <div
                    id="count2"
                    class="count">

                    0

                </div>

            </div>

            <!-- Nivel 3 -->

            <div class="row">

                <div class="emoji-label">

                    😐

                </div>

                <div class="bar">

                    <div
                        id="bar3"
                        class="fill yellow">

                    </div>

                </div>

                <div
                    id="count3"
                    class="count">

                    0

                </div>

            </div>

            <!-- Nivel 4 -->

            <div class="row">

                <div class="emoji-label">

                    🙂

                </div>

                <div class="bar">

                    <div
                        id="bar4"
                        class="fill green">

                    </div>

                </div>

                <div
                    id="count4"
                    class="count">

                    0

                </div>

            </div>

            <!-- Nivel 5 -->

            <div class="row">

                <div class="emoji-label">

                    😁

                </div>

                <div class="bar">

                    <div
                        id="bar5"
                        class="fill darkgreen">

                    </div>

                </div>

                <div
                    id="count5"
                    class="count">

                    0

                </div>

            </div>

        </section>

        <!-- Resumen -->

        <section class="summary-grid">

            <div class="summary-card">

                <span>😫</span>

                <h3 id="p1">

                    0%

                </h3>

                <small>

                    Muy Baja

                </small>

            </div>

            <div class="summary-card">

                <span>🙁</span>

                <h3 id="p2">

                    0%

                </h3>

                <small>

                    Baja

                </small>

            </div>

            <div class="summary-card">

                <span>😐</span>

                <h3 id="p3">

                    0%

                </h3>

                <small>

                    Normal

                </small>

            </div>

            <div class="summary-card">

                <span>🙂</span>

                <h3 id="p4">

                    0%

                </h3>

                <small>

                    Buena

                </small>

            </div>

            <div class="summary-card">

                <span>😁</span>

                <h3 id="p5">

                    0%

                </h3>

                <small>

                    Excelente

                </small>

            </div>

        </section>
    </main>

    <script type="module" src="js/firebase.js"></script>

    <script type="module" src="js/dashboard.js"></script>

</body>

</html>
